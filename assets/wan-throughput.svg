<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13">
  <!-- Real-internet bench (2026-07-15, home -> VPS, 43 ms RTT, ~500 Mbit path).
       Median of 3 SHA-256-verified runs per cell; run 20260715T165807Z in
       demo/results/. Throughput = payload bytes / wall time, so every tool
       pays its own connection setup. rclone-sftp runs the fairness flags
       (see demo/remote_bench.sh); multi-thread streams cannot engage over
       sftp (no OpenWriterAt/OpenChunkWriter — verified, it is a silent
       no-op). Colors legible on light + dark themes. -->

  <text x="70" y="20" fill="#8b8b8b" font-size="14">Real internet, home → VPS — 43 ms RTT, ~500 Mbit path (medians of 3, SHA-256 verified)</text>

  <!-- legend -->
  <g font-size="13">
    <rect x="70" y="32" width="12" height="12" fill="#3fb950"/>
    <text x="88" y="43" fill="#8b8b8b">atp-experiment (sealed)</text>
    <rect x="260" y="32" width="12" height="12" fill="#58a6ff"/>
    <text x="278" y="43" fill="#8b8b8b">rsync-ssh (tuned)</text>
    <rect x="420" y="32" width="12" height="12" fill="#d29922"/>
    <text x="438" y="43" fill="#8b8b8b">rclone-sftp (tuned)</text>
  </g>

  <!-- gridlines + y tick labels (0..400 Mbit/s) -->
  <g stroke="#888888" stroke-opacity="0.25">
    <line x1="70" y1="281.1" x2="730" y2="281.1"/>
    <line x1="70" y1="212.2" x2="730" y2="212.2"/>
    <line x1="70" y1="143.3" x2="730" y2="143.3"/>
    <line x1="70" y1="74.4" x2="730" y2="74.4"/>
  </g>
  <line x1="70" y1="350" x2="730" y2="350" stroke="#888888" stroke-opacity="0.6"/>
  <g fill="#8b8b8b" text-anchor="end">
    <text x="60" y="354">0</text>
    <text x="60" y="285">100</text>
    <text x="60" y="216">200</text>
    <text x="60" y="147">300</text>
    <text x="60" y="78">400</text>
  </g>
  <text x="18" y="195" fill="#8b8b8b" text-anchor="middle" transform="rotate(-90 18 195)">throughput (Mbit/s)</text>

  <!-- 8 MiB group -->
  <rect x="97" y="285.4" width="50" height="64.6" fill="#3fb950"/>
  <rect x="155" y="315.9" width="50" height="34.1" fill="#58a6ff"/>
  <rect x="213" y="322.5" width="50" height="27.5" fill="#d29922"/>
  <text x="122" y="279.4" fill="#3fb950" text-anchor="middle" font-size="12">94</text>
  <text x="180" y="309.9" fill="#58a6ff" text-anchor="middle" font-size="12">50</text>
  <text x="238" y="316.5" fill="#d29922" text-anchor="middle" font-size="12">40</text>
  <text x="180" y="372" fill="#8b8b8b" text-anchor="middle">8 MiB</text>

  <!-- 64 MiB group -->
  <rect x="317" y="179.2" width="50" height="170.8" fill="#3fb950"/>
  <rect x="375" y="206.0" width="50" height="144.0" fill="#58a6ff"/>
  <rect x="433" y="213.8" width="50" height="136.2" fill="#d29922"/>
  <text x="342" y="173.2" fill="#3fb950" text-anchor="middle" font-size="12">248</text>
  <text x="400" y="200.0" fill="#58a6ff" text-anchor="middle" font-size="12">209</text>
  <text x="458" y="207.8" fill="#d29922" text-anchor="middle" font-size="12">198</text>
  <text x="400" y="372" fill="#8b8b8b" text-anchor="middle">64 MiB</text>

  <!-- 256 MiB group -->
  <rect x="537" y="62.9" width="50" height="287.1" fill="#3fb950"/>
  <rect x="595" y="129.6" width="50" height="220.4" fill="#58a6ff"/>
  <rect x="653" y="128.1" width="50" height="221.9" fill="#d29922"/>
  <text x="562" y="56.9" fill="#3fb950" text-anchor="middle" font-size="12">417</text>
  <text x="620" y="123.6" fill="#58a6ff" text-anchor="middle" font-size="12">320</text>
  <text x="678" y="122.1" fill="#d29922" text-anchor="middle" font-size="12">322</text>
  <text x="620" y="372" fill="#8b8b8b" text-anchor="middle">256 MiB</text>

  <text x="400" y="398" fill="#8b8b8b" text-anchor="middle">payload size</text>
</svg>
